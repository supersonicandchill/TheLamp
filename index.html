<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Scripture"/>
<meta name="theme-color" content="#0a0e17"/>
<title>Scripture v9</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e17;
    --bg2: #0f1420;
    --bg3: #161d2e;
    --bg4: #1c2438;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --gold3: #a07830;
    --text: #e8e0d0;
    --text2: #b0a890;
    --text3: #706858;
    --accent: #4a7fa5;
    --red: #c45c3a;
    --nav-h: 64px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'EB Garamond', Georgia, serif; }

  /* ── SCREENS ── */
  #app { height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .screen { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--bg);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
    padding-top: calc(12px + env(safe-area-inset-top, 0px));
  }
  .topbar-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    flex: 1;
    text-align: center;
  }
  .topbar-btn {
    background: none; border: none; color: var(--gold);
    font-size: 20px; cursor: pointer; padding: 4px 8px;
    display: flex; align-items: center; justify-content: center;
    min-width: 36px; min-height: 36px;
  }
  .topbar-btn:active { opacity: 0.6; }

  /* ── READ SCREEN ── */
  #read-scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 0 0 calc(var(--nav-h) + var(--safe-bottom) + 20px);
    scroll-behavior: smooth;
  }
  .chapter-header {
    text-align: center;
    padding: 32px 20px 20px;
    border-bottom: 1px solid rgba(201,168,76,0.12);
    margin-bottom: 4px;
  }
  .book-name {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold2);
    letter-spacing: 0.08em;
  }
  .chapter-num {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 0.2em;
    margin-top: 4px;
    text-transform: uppercase;
  }
  .verses-container { padding: 8px 20px 16px; }
  .verse {
    display: flex; gap: 10px;
    padding: 5px 0;
    line-height: 1.85;
  }
  .verse-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--gold3);
    min-width: 22px;
    padding-top: 5px;
    text-align: right;
    flex-shrink: 0;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .verse-text {
    font-size: 17px;
    color: var(--text);
    flex: 1;
    font-weight: 400;
    letter-spacing: 0.01em;
  }
  .verse-text.jesus { color: #e8a090; }
  .strongs-word {
    text-decoration: underline;
    text-decoration-color: rgba(201,168,76,0.4);
    text-underline-offset: 3px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .strongs-word:active { color: var(--gold2); }

  /* chapter nav */
  .chapter-nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px;
    border-top: 1px solid rgba(201,168,76,0.1);
    flex-shrink: 0;
  }
  .chap-nav-btn {
    background: var(--bg3); border: 1px solid rgba(201,168,76,0.2);
    color: var(--gold); border-radius: 8px;
    padding: 10px 18px; font-size: 15px; cursor: pointer;
    font-family: 'EB Garamond', serif;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.2s;
  }
  .chap-nav-btn:active { background: var(--bg4); }
  .chap-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .chap-nav-center { font-family: 'Cinzel', serif; font-size: 11px; color: var(--text3); letter-spacing: 0.15em; }

  /* loading */
  .loader {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 20px; gap: 16px; flex: 1;
  }
  .loader-cross {
    font-size: 32px; color: var(--gold);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(0.95)} 50%{opacity:1;transform:scale(1.05)} }
  .loader-text { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.2em; color: var(--text3); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    height: var(--nav-h);
    padding-bottom: var(--safe-bottom);
    background: var(--bg2);
    border-top: 1px solid rgba(201,168,76,0.12);
    display: flex;
    flex-shrink: 0;
    z-index: 50;
  }
  .nav-btn {
    flex: 1; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; color: var(--text3); transition: color 0.2s;
    font-size: 10px; font-family: 'Cinzel', serif; letter-spacing: 0.1em;
  }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn.active { color: var(--gold); }
  .nav-btn:active { opacity: 0.7; }

  /* ── BOOK PICKER MODAL ── */
  .modal {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    display: none; flex-direction: column;
  }
  .modal.open { display: flex; }
  .modal-sheet {
    background: var(--bg2);
    border-top: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px 20px 0 0;
    margin-top: auto;
    max-height: 85vh;
    display: flex; flex-direction: column;
    overflow: hidden;
    padding-bottom: var(--safe-bottom);
  }
  .modal-handle {
    width: 40px; height: 4px; background: var(--bg4);
    border-radius: 2px; margin: 12px auto 4px;
    flex-shrink: 0;
  }
  .modal-title {
    font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.2em;
    color: var(--gold); text-transform: uppercase;
    text-align: center; padding: 8px 16px 12px;
    flex-shrink: 0;
  }

  /* testament tabs */
  .testament-tabs {
    display: flex; padding: 0 16px 10px;
    gap: 8px; flex-shrink: 0;
  }
  .tab-btn {
    flex: 1; padding: 8px; border-radius: 8px;
    background: var(--bg3); border: 1px solid transparent;
    font-family: 'Cinzel', serif; font-size: 11px;
    letter-spacing: 0.1em; color: var(--text2); cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--bg4); border-color: rgba(201,168,76,0.3); color: var(--gold); }

  .book-list { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; padding: 4px 16px 16px; }
  .book-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; margin-bottom: 4px;
    background: var(--bg3); border-radius: 10px;
    cursor: pointer; transition: background 0.15s;
    border: 1px solid transparent;
  }
  .book-item:active, .book-item.selected { background: var(--bg4); border-color: rgba(201,168,76,0.25); }
  .book-item-name { font-size: 16px; color: var(--text); }
  .book-item-abbr { font-family: 'Cinzel', serif; font-size: 10px; color: var(--text3); letter-spacing: 0.1em; }

  /* chapter grid modal */
  .chap-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 8px 16px 16px; overflow-y: auto; }
  .chap-cell {
    aspect-ratio: 1; background: var(--bg3); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 13px; color: var(--text2);
    cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
  }
  .chap-cell:active { background: var(--bg4); border-color: rgba(201,168,76,0.3); color: var(--gold); }
  .chap-cell.current { border-color: var(--gold); color: var(--gold); }

  /* ── SEARCH SCREEN ── */
  #search-screen { background: var(--bg); }
  .search-header {
    padding: calc(16px + env(safe-area-inset-top,0px)) 16px 12px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    flex-shrink: 0;
  }
  .search-bar {
    display: flex; gap: 10px; align-items: center;
    background: var(--bg3); border-radius: 12px;
    padding: 10px 14px; border: 1px solid rgba(201,168,76,0.15);
  }
  .search-bar input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'EB Garamond', serif; font-size: 17px;
    caret-color: var(--gold);
  }
  .search-bar input::placeholder { color: var(--text3); }
  .search-bar svg { color: var(--gold); opacity: 0.6; flex-shrink: 0; }
  .search-results { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 16px; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px); }
  .result-item {
    padding: 14px; margin-bottom: 8px;
    background: var(--bg3); border-radius: 10px;
    cursor: pointer; border: 1px solid rgba(201,168,76,0.08);
    transition: background 0.15s;
  }
  .result-item:active { background: var(--bg4); }
  .result-ref { font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold); letter-spacing: 0.15em; margin-bottom: 5px; }
  .result-text { font-size: 15px; color: var(--text2); line-height: 1.6; }
  .result-text em { color: var(--gold2); font-style: normal; }
  .search-empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .search-empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .search-empty p { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.15em; }

  /* ── SAVED SCREEN ── */
  #saved-screen { background: var(--bg); }
  .saved-header {
    padding: calc(16px + env(safe-area-inset-top,0px)) 16px 12px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    flex-shrink: 0;
    font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 0.15em;
    color: var(--gold); text-align: center;
  }
  .saved-list { flex: 1; overflow-y: auto; padding: 8px 16px; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px); -webkit-overflow-scrolling: touch; }
  .saved-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px; margin-bottom: 8px;
    background: var(--bg3); border-radius: 10px;
    border-left: 3px solid var(--gold3);
  }
  .saved-item-content { flex: 1; cursor: pointer; }
  .saved-item-ref { font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold); letter-spacing: 0.15em; margin-bottom: 5px; }
  .saved-item-text { font-size: 15px; color: var(--text2); line-height: 1.6; }
  .saved-delete { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; }
  .saved-empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .saved-empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .saved-empty p { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.15em; line-height: 2; }

  /* ── BOOKS SCREEN ── */
  #books-screen { background: var(--bg); }
  .books-header {
    padding: calc(16px + env(safe-area-inset-top,0px)) 16px 12px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    flex-shrink: 0;
  }
  .books-title { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 0.2em; color: var(--gold); text-align: center; margin-bottom: 10px; }
  .books-tabs { display: flex; gap: 8px; }
  .books-tab {
    flex: 1; padding: 8px; border-radius: 8px;
    background: var(--bg3); border: 1px solid transparent;
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.1em;
    color: var(--text2); cursor: pointer; transition: all 0.2s;
  }
  .books-tab.active { background: var(--bg4); border-color: rgba(201,168,76,0.3); color: var(--gold); }
  .books-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 16px; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px); }
  .books-section-title { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.25em; color: var(--text3); text-transform: uppercase; padding: 12px 4px 6px; }
  .books-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 4px; }
  .books-grid-item {
    background: var(--bg3); border-radius: 8px; padding: 12px 10px;
    cursor: pointer; transition: background 0.15s;
    border: 1px solid rgba(201,168,76,0.06);
  }
  .books-grid-item:active { background: var(--bg4); border-color: rgba(201,168,76,0.2); }
  .books-grid-name { font-size: 14px; color: var(--text); }
  .books-grid-chaps { font-family: 'Cinzel', serif; font-size: 9px; color: var(--text3); margin-top: 2px; letter-spacing: 0.1em; }

  /* ── STRONG'S DRAWER ── */
  .strongs-drawer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
    background: var(--bg2);
    border-top: 1px solid rgba(201,168,76,0.25);
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 65vh;
    display: flex; flex-direction: column;
    padding-bottom: calc(20px + var(--safe-bottom));
  }
  .strongs-drawer.open { transform: translateY(0); }
  .strongs-handle { width: 40px; height: 4px; background: var(--bg4); border-radius: 2px; margin: 12px auto 4px; flex-shrink: 0; }
  .strongs-content { flex: 1; overflow-y: auto; padding: 8px 20px 20px; }
  .strongs-word-display { font-size: 26px; color: var(--gold2); font-style: italic; margin-bottom: 2px; }
  .strongs-transliteration { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 12px; }
  .strongs-number { display: inline-block; background: var(--bg3); border: 1px solid rgba(201,168,76,0.2); border-radius: 6px; padding: 2px 8px; font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold3); margin-bottom: 14px; }
  .strongs-def { font-size: 16px; line-height: 1.75; color: var(--text); }
  .strongs-origin { font-size: 14px; color: var(--text2); margin-top: 10px; font-style: italic; }
  .strongs-kjv { font-size: 13px; color: var(--text3); margin-top: 8px; font-family: 'Inter', sans-serif; }
  .strongs-close { position: absolute; top: 14px; right: 16px; background: var(--bg3); border: none; color: var(--text2); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }

  /* ── VERSE CONTEXT MENU ── */
  .verse-menu {
    position: fixed; z-index: 250; background: var(--bg3);
    border: 1px solid rgba(201,168,76,0.2); border-radius: 12px;
    overflow: hidden; display: none; min-width: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .verse-menu.open { display: block; }
  .verse-menu-item {
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; font-size: 14px; color: var(--text);
    font-family: 'Inter', sans-serif; transition: background 0.15s;
  }
  .verse-menu-item:active { background: var(--bg4); }
  .verse-menu-item span { font-size: 16px; }

  /* overlay for closing modals */
  #overlay { position: fixed; inset: 0; z-index: 190; display: none; }
  #overlay.open { display: block; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 0; }

  /* ── DECORATIVE ── */
  .ornament { color: var(--gold3); font-size: 18px; margin: 0 8px; opacity: 0.6; }

  .verse-saved-indicator { color: var(--gold); font-size: 12px; margin-left: 4px; }
</style>
<script src="strongs_hebrew.js"></script>
<script src="strongs_greek.js"></script>
</head>
<body>
<div id="app">

  <!-- READ SCREEN -->
  <div class="screen active" id="read-screen">
    <div class="topbar" id="topbar-main">
      <button class="topbar-btn" id="font-size-btn" title="Font size">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><text x="2" y="16" font-size="11" fill="currentColor" stroke="none">A</text><text x="11" y="18" font-size="15" fill="currentColor" stroke="none">A</text></svg>
      </button>
      <button class="topbar-title" id="book-chapter-btn" style="background:none;border:none;cursor:pointer;">
        <span id="current-ref-display">Genesis 1</span>
      </button>
      <button class="topbar-btn" id="save-chapter-btn" title="Save verse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>
    <div id="read-scroll">
      <div id="chapter-content">
        <div class="loader">
          <div class="loader-cross">✝</div>
          <div class="loader-text">Loading Scripture...</div>
        </div>
      </div>
    </div>
    <div class="chapter-nav">
      <button class="chap-nav-btn" id="prev-chap">&#8592; Prev</button>
      <div class="chap-nav-center" id="chap-of-total">— / —</div>
      <button class="chap-nav-btn" id="next-chap">Next &#8594;</button>
    </div>
  </div>

  <!-- SEARCH SCREEN -->
  <div class="screen" id="search-screen">
    <div class="search-header">
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search scripture…" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button id="search-clear" style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;display:none;">✕</button>
      </div>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-empty">
        <div class="search-empty-icon">📖</div>
        <p>Search by keyword or phrase<br>across all 66 books</p>
      </div>
    </div>
  </div>

  <!-- SAVED SCREEN -->
  <div class="screen" id="saved-screen">
    <div class="saved-header">Saved Verses</div>
    <div class="saved-list" id="saved-list"></div>
  </div>

  <!-- BOOKS SCREEN -->
  <div class="screen" id="books-screen">
    <div class="books-header">
      <div class="books-title">Books of the Bible</div>
      <div class="books-tabs">
        <button class="books-tab active" id="books-ot-tab">Old Testament</button>
        <button class="books-tab" id="books-nt-tab">New Testament</button>
      </div>
    </div>
    <div class="books-list" id="books-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-screen="read">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Read
    </button>
    <button class="nav-btn" data-screen="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Search
    </button>
    <button class="nav-btn" data-screen="saved">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      Saved
    </button>
    <button class="nav-btn" data-screen="books">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Books
    </button>
  </nav>
</div>

<!-- BOOK PICKER MODAL -->
<div class="modal" id="book-modal">
  <div style="flex:1" id="book-modal-backdrop"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Select Book</div>
    <div class="testament-tabs" id="picker-testament-tabs">
      <button class="tab-btn active" data-t="OT">Old Testament</button>
      <button class="tab-btn" data-t="NT">New Testament</button>
    </div>
    <div class="book-list" id="book-picker-list"></div>
  </div>
</div>

<!-- CHAPTER PICKER MODAL -->
<div class="modal" id="chap-modal">

async function bibleApiFetch(path) {
  var direct = 'https://bible-api.com' + path;
  var proxy  = 'https://corsproxy.io/?' + encodeURIComponent(direct);
  var attempts = [direct, proxy];
  var lastErr = '';
  for (var i = 0; i < attempts.length; i++) {
    try {
      var res = await fetch(attempts[i]);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    } catch(e) {
      lastErr = e.message;
    }
  }
  throw new Error('Failed: ' + lastErr);
}

async function fetchChapter(bookId, chapter) {
  var cacheKey = currentTranslation + '-' + bookId + '-' + chapter;
  if (chapterCache[cacheKey]) return chapterCache[cacheKey];
  var slug = BOOK_SLUG[bookId].replace(/ /g, '+');
  var data = await bibleApiFetch('/' + slug + '+' + chapter + '?translation=' + currentTranslation);
  if (data.error) throw new Error(data.error);
  chapterCache[cacheKey] = data;
  return data;
}

async function searchBible(query) {
  try {
    var data = await bibleApiFetch('/' + encodeURIComponent(query) + '?translation=' + currentTranslation);
    return (data.verses || []).map(function(v) {
      return { reference: v.book_name + ' ' + v.chapter + ':' + v.verse, text: v.text.trim() };
    });
  } catch(e) { return []; }
}

function lookupByNum(num) {
  if (!num) return null;
  if (num.startsWith('H') && typeof STRONGS_H !== 'undefined') return STRONGS_H[num] || null;
  if (num.startsWith('G') && typeof STRONGS_G !== 'undefined') return STRONGS_G[num] || null;
  return null;
}

function lookupStrongs(englishWord) {
  var w = (englishWord || '').toLowerCase().replace(/[^a-z]/g, '');
  var num = ENGLISH_TO_STRONGS[w];
  if (!num) return null;
  return lookupByNum(num);
}

var state = {
  bookId:'GEN', chapter:1, fontSize:17,
  savedVerses: JSON.parse(localStorage.getItem('saved_verses') || '[]'),
  activeScreen:'read', pickerTestament:'OT', booksTabTestament:'OT',
};

function renderVerseText(text) {
  var words = text.split(/(\s+)/);
  return words.map(function(w) {
    var clean = w.replace(/[^\w']/g,'');
    if (clean.length > 3 && /^[a-zA-Z]/.test(clean)) {
      return '<span class="strongs-word" data-word="' + clean.toLowerCase() + '">' + w + '</span>';
    }
    return w;
  }).join('');
}

async function loadChapter(bookId, chapter) {
  state.bookId = bookId; state.chapter = chapter;
  var book = BOOK_MAP[bookId];
  document.getElementById('current-ref-display').textContent = book.name + ' ' + chapter;
  document.getElementById('chap-of-total').textContent = chapter + ' / ' + book.chaps;
  document.getElementById('prev-chap').disabled = (chapter===1 && bookId===BOOKS[0].id);
  document.getElementById('next-chap').disabled = (chapter===book.chaps && bookId===BOOKS[BOOKS.length-1].id);
  document.getElementById('read-scroll').scrollTop = 0;
  var container = document.getElementById('chapter-content');
  container.innerHTML = '<div class="loader"><div class="loader-cross">&#10013;</div><div class="loader-text">Loading&#8230;</div></div>';
  try {
    var data = await fetchChapter(bookId, chapter);
    var verses = (data.verses || []).map(function(v) {
      return { num: v.verse, text: v.text.trim() };
    });
    if (!verses.length) throw new Error('No verses returned');
    renderChapter(book, chapter, verses);
  } catch(e) {
    container.innerHTML = '<div class="loader"><div class="loader-cross" style="color:var(--red)">&#10005;</div><div class="loader-text" style="max-width:280px;text-align:center">Could not load.<br><span style="font-size:11px;color:var(--text3)">' + e.message.slice(0,120) + '</span></div></div>';
  }
}

function renderChapter(book, chapter, verses) {
  var tFull = TRANSLATIONS[currentTranslation] ? TRANSLATIONS[currentTranslation].full : '';
  var html = '<div class="chapter-header"><div class="book-name">' + book.name + '</div>' +
    '<div class="chapter-num"><span class="ornament">&#10022;</span> Chapter ' + chapter + ' <span class="ornament">&#10022;</span></div>' +
    '<div style="font-family:\'Cinzel\',serif;font-size:10px;color:var(--text3);margin-top:6px;letter-spacing:0.15em">' + tFull + '</div></div>' +
    '<div class="verses-container">';
  for (var i=0; i<verses.length; i++) {
    var v = verses[i];
    var ref = book.name + ' ' + chapter + ':' + v.num;
    var saved = state.savedVerses.find(function(s){return s.ref===ref;});
    var sm = saved ? '<span class="verse-saved-indicator">&#128278;</span>' : '';
    html += '<div class="verse" data-versenum="' + v.num + '" data-ref="' + ref + '" data-text="' + v.text.replace(/"/g,'&quot;') + '">' +
      '<div class="verse-num">' + v.num + '</div>' +
      '<div class="verse-text" style="font-size:' + state.fontSize + 'px">' + renderVerseText(v.text) + sm + '</div></div>';
  }
  html += '</div>';
  document.getElementById('chapter-content').innerHTML = html;
}

function buildTranslationBtn() {
  var topbar = document.querySelector('.topbar');
  var btn = document.createElement('button');
  btn.className = 'topbar-btn'; btn.id = 'transl-btn';
  btn.style.cssText = 'font-family:"Cinzel",serif;font-size:10px;letter-spacing:0.08em;min-width:44px';
  btn.textContent = TRANSLATIONS[currentTranslation].label;
  btn.onclick = function() {
    var keys = Object.keys(TRANSLATIONS);
    var idx = keys.indexOf(currentTranslation);
    currentTranslation = keys[(idx+1) % keys.length];
    localStorage.setItem('biblio_translation', currentTranslation);
    btn.textContent = TRANSLATIONS[currentTranslation].label;
    chapterCache = {}; strongsCache = {};
    loadChapter(state.bookId, state.chapter);
  };
  topbar.insertBefore(btn, topbar.firstChild);
}

function getAdjacentChapter(dir) {
  var book = BOOK_MAP[state.bookId];
  var idx = BOOKS.findIndex(function(b){return b.id===state.bookId;});
  var chap = state.chapter + dir;
  if (chap<1){idx--;if(idx<0)return null;return{bookId:BOOKS[idx].id,chapter:BOOKS[idx].chaps};}
  if (chap>book.chaps){idx++;if(idx>=BOOKS.length)return null;return{bookId:BOOKS[idx].id,chapter:1};}
  return {bookId:state.bookId,chapter:chap};
}
document.getElementById('prev-chap').onclick = function(){var n=getAdjacentChapter(-1);if(n)loadChapter(n.bookId,n.chapter);};
document.getElementById('next-chap').onclick = function(){var n=getAdjacentChapter(1);if(n)loadChapter(n.bookId,n.chapter);};
document.getElementById('font-size-btn').onclick = function(){

function renderBookPicker(){

  var books=BOOKS.filter(function(b){return b.t===t;});
  list.innerHTML=books.map(function(b){
    return '<div class="book-item '+(b.id===state.bookId?'selected':'')+'" data-id="'+b.id+'"><span class="book-item-name">'+b.name+'</span><span class="book-item-abbr">'+b.chaps+' ch</span></div>';
  }).join('');
  list.querySelectorAll('.book-item').forEach(function(el){el.onclick=function(){openChapPicker(el.dataset.id);};});
}

});
function openChapPicker(bookId){
  var book=BOOK_MAP[bookId];
  document.getElementById('book-modal').classList.remove('open');
  document.getElementById('chap-modal-title').textContent=book.name;
  var cells='';
  for(var n=1;n<=book.chaps;n++){cells+='<div class="chap-cell '+(bookId===state.bookId&&n===state.chapter?'current':'')+'" data-chap="'+n+'">'+n+'</div>';}
  document.getElementById('chap-grid').innerHTML=cells;
  document.querySelectorAll('.chap-cell').forEach(function(el){el.onclick=function(){closeModals();loadChapter(bookId,parseInt(el.dataset.chap));showScreen('read');};});
  document.getElementById('chap-modal').classList.add('open');
}

var verseMenuTarget=null, longPressTimer=null;
function showVerseMenu(el){var menu=document.getElementById('verse-menu');menu.classList.add('open');verseMenuTarget=el;var r=el.getBoundingClientRect();menu.style.top=Math.min(r.bottom+4,window.innerHeight-100)+'px';menu.style.left='20px';menu.style.right='20px';}
function closeVerseMenu(){document.getElementById('verse-menu').classList.remove('open');verseMenuTarget=null;}
document.getElementById('chapter-content').addEventListener('touchstart',function(e){var v=e.target.closest('.verse');if(!v||e.target.classList.contains('strongs-word'))return;longPressTimer=setTimeout(function(){showVerseMenu(v);},500);},{passive:true});
document.getElementById('chapter-content').addEventListener('touchend',function(){clearTimeout(longPressTimer);},{passive:true});
document.getElementById('chapter-content').addEventListener('touchmove',function(){clearTimeout(longPressTimer);},{passive:true});
document.getElementById('menu-save').onclick=function(){
  if(!verseMenuTarget)return;
  var ref=verseMenuTarget.dataset.ref,text=verseMenuTarget.dataset.text;
  if(!state.savedVerses.find(function(s){return s.ref===ref;})){state.savedVerses.push({ref:ref,text:text});localStorage.setItem('saved_verses',JSON.stringify(state.savedVerses));}
  verseMenuTarget.querySelector('.verse-text').insertAdjacentHTML('beforeend','<span class="verse-saved-indicator">&#128278;</span>');
  closeVerseMenu();
};
document.getElementById('menu-copy').onclick=function(){
  if(!verseMenuTarget)return;
  if(navigator.clipboard)navigator.clipboard.writeText('"'+verseMenuTarget.dataset.text+'" - '+verseMenuTarget.dataset.ref).catch(function(){});
  closeVerseMenu();
};

document.getElementById('chapter-content').addEventListener('click',function(e){
  var sw=e.target.closest('.strongs-word');
  if(!sw)return;
  showStrongsDrawer(sw.dataset.word,sw.textContent.trim());
});
function showStrongsDrawer(word,displayWord){
  var drawer=document.getElementById('strongs-drawer');
  var content=document.getElementById('strongs-content');
  var data=lookupStrongs(word.toLowerCase());
  if(data){
    var pronounceHtml = data.pronoun ? '<div class="strongs-transliteration" style="color:var(--text2)">&#x1F50A; '+data.pronoun+'</div>' : '';
    content.innerHTML=
      '<div class="strongs-number">'+data.num+'</div>'+
      '<div class="strongs-word-display">'+data.orig+'</div>'+
      '<div class="strongs-transliteration">'+data.translit+'</div>'+
      pronounceHtml+
      '<div class="strongs-def" style="margin-top:12px">'+data.def+'</div>'+
      (data.kjv ? '<div class="strongs-kjv" style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(201,168,76,0.1)"><strong style="color:var(--text3);font-family:\'Cinzel\',serif;font-size:10px;letter-spacing:0.1em">KJV USAGE</strong><br><span style="color:var(--text2);line-height:1.7">'+data.kjv+'</span></div>' : '')+
      '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(201,168,76,0.08)"><strong style="color:var(--text3);font-family:\'Cinzel\',serif;font-size:10px;letter-spacing:0.1em">WORD IN TEXT</strong><br>"<em style="color:var(--text2)">'+displayWord+'</em>"</div>';
  } else {
    content.innerHTML=
      '<div class="strongs-word-display" style="font-style:normal;font-size:20px">'+displayWord+'</div>'+
      '<div style="margin-top:16px;color:var(--text2);font-size:15px;line-height:1.7">No Strong\'s entry indexed for <em>'+displayWord+'</em>.</div>'+
      '<div style="margin-top:8px;color:var(--text3);font-size:13px;line-height:1.7">For a complete lookup visit <span style="color:var(--gold3)">BlueLetterBible.org</span>.</div>';
  }
  drawer.classList.add('open');
}
document.getElementById('strongs-close').onclick=function(){document.getElementById('strongs-drawer').classList.remove('open');};
var dStartY=0;
document.getElementById('strongs-drawer').addEventListener('touchstart',function(e){dStartY=e.touches[0].clientY;},{passive:true});
document.getElementById('strongs-drawer').addEventListener('touchend',function(e){if(e.changedTouches[0].clientY-dStartY>60)document.getElementById('strongs-drawer').classList.remove('open');},{passive:true});

function showScreen(name){
  state.activeScreen=name;
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById(name+'-screen').classList.add('active');
  document.querySelector('.nav-btn[data-screen="'+name+'"]').classList.add('active');
  if(name==='saved')renderSavedScreen();
  if(name==='books')renderBooksScreen();
}
document.querySelectorAll('.nav-btn').forEach(function(btn){btn.onclick=function(){showScreen(btn.dataset.screen);};});

var searchTimer=null;
document.getElementById('search-input').addEventListener('input',function(e){
  var q=e.target.value.trim();
  document.getElementById('search-clear').style.display=q?'block':'none';
  clearTimeout(searchTimer);
  if(q.length<3){document.getElementById('search-results').innerHTML='<div class="search-empty"><div class="search-empty-icon">&#128214;</div><p>Search by keyword or phrase<br>across all 66 books</p></div>';return;}
  searchTimer=setTimeout(function(){runSearch(q);},600);
});
document.getElementById('search-clear').onclick=function(){
  document.getElementById('search-input').value='';
  document.getElementById('search-clear').style.display='none';
  document.getElementById('search-results').innerHTML='<div class="search-empty"><div class="search-empty-icon">&#128214;</div><p>Search by keyword or phrase<br>across all 66 books</p></div>';
};
async function runSearch(q){
  var results=document.getElementById('search-results');
  results.innerHTML='<div class="loader"><div class="loader-cross">&#10013;</div><div class="loader-text">Searching&#8230;</div></div>';
  try{
    var verses=await searchBible(q);
    if(!verses.length){results.innerHTML='<div class="search-empty"><div class="search-empty-icon">&#128269;</div><p>No results found</p></div>';return;}
    results.innerHTML=verses.map(function(v){
      var hi=v.text.replace(new RegExp('('+q+')','gi'),'<em>$1</em>');
      return '<div class="result-item" data-ref="'+v.reference+'"><div class="result-ref">'+v.reference+'</div><div class="result-text">'+hi+'</div></div>';
    }).join('');
    results.querySelectorAll('.result-item').forEach(function(el){
      el.onclick=function(){
        var parts=el.dataset.ref.split(' ');
        var cv=parts[parts.length-1].split(':');
        var book=BOOKS.find(function(b){return b.name===parts.slice(0,-1).join(' ');});
        if(book){loadChapter(book.id,parseInt(cv[0]));showScreen('read');}
      };
    });
  }catch(e){results.innerHTML='<div class="search-empty"><div class="search-empty-icon">&#9888;</div><p>Search unavailable.</p></div>';}
}

function renderSavedScreen(){
  var list=document.getElementById('saved-list');
  if(!state.savedVerses.length){list.innerHTML='<div class="saved-empty"><div class="saved-empty-icon">&#128278;</div><p>No saved verses yet.<br>Long-press any verse to save it.</p></div>';return;}
  list.innerHTML=state.savedVerses.map(function(v,i){
    return '<div class="saved-item"><div class="saved-item-content" data-ref="'+v.ref+'"><div class="saved-item-ref">'+v.ref+'</div><div class="saved-item-text">'+v.text+'</div></div><button class="saved-delete" data-i="'+i+'">&#10005;</button></div>';
  }).join('');
  list.querySelectorAll('.saved-item-content').forEach(function(el){
    el.onclick=function(){var parts=el.dataset.ref.split(' ');var cv=parts[parts.length-1].split(':');var book=BOOKS.find(function(b){return b.name===parts.slice(0,-1).join(' ');});if(book){loadChapter(book.id,parseInt(cv[0]));showScreen('read');}};
  });
  list.querySelectorAll('.saved-delete').forEach(function(btn){
    btn.onclick=function(){state.savedVerses.splice(parseInt(btn.dataset.i),1);localStorage.setItem('saved_verses',JSON.stringify(state.savedVerses));renderSavedScreen();};
  });
}

function renderBooksScreen(){
  var t=state.booksTabTestament;
  var books=BOOKS.filter(function(b){return b.t===t;});
  var sections=[];
  books.forEach(function(b){b.sections.forEach(function(s){if(sections.indexOf(s)===-1)sections.push(s);});});
  var html='';
  sections.forEach(function(sec){
    var sb=books.filter(function(b){return b.sections.indexOf(sec)!==-1;});
    html+='<div class="books-section-title">'+sec+'</div><div class="books-grid">';
    html+=sb.map(function(b){return '<div class="books-grid-item" data-id="'+b.id+'"><div class="books-grid-name">'+b.name+'</div><div class="books-grid-chaps">'+b.chaps+' chapters</div></div>';}).join('');
    html+='</div>';
  });
  document.getElementById('books-list').innerHTML=html;
  document.querySelectorAll('.books-grid-item').forEach(function(el){el.onclick=function(){openChapPicker(el.dataset.id);};});
}
document.getElementById('books-ot-tab').onclick=function(){state.booksTabTestament='OT';document.getElementById('books-ot-tab').classList.add('active');document.getElementById('books-nt-tab').classList.remove('active');renderBooksScreen();};
document.getElementById('books-nt-tab').onclick=function(){state.booksTabTestament='NT';document.getElementById('books-nt-tab').classList.add('active');document.getElementById('books-ot-tab').classList.remove('active');renderBooksScreen();};

buildTranslationBtn();
loadChapter('GEN',1);
</script>
